name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore
        run: nuget restore GAF.sln

      - name: Build
        run: msbuild GAF.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GAF-Release
          path: GAF/bin/Release/
          if-no-files-found: error
